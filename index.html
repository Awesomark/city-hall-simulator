<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>City Hall Simulator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1>City Hall Simulator</h1>
        <div class="date-line">
          <span id="turnLabel">Turn 1</span>
          <span id="termLabel">Year 1</span>
          <span id="monthLabel">January</span>
        </div>
      </header>

      <section class="workbench">
        <aside class="city-panel" aria-label="City status">
          <h2 id="cityName">Fairview</h2>
          <div class="city-fact">
            <span>Population</span>
            <strong id="populationMetric">0</strong>
          </div>
          <h3>Groups</h3>
          <div class="group-list" id="groupList"></div>
        </aside>

        <section class="main-panel" aria-label="City agenda">
          <section class="metrics-panel" aria-label="City metrics">
            <h2>City Metrics</h2>
            <div class="metrics-grid" id="metricsGrid"></div>
          </section>

          <section class="question-panel" aria-label="Current question">
            <div class="question-head">
              <span id="questionDept">Agenda</span>
              <strong id="questionImpact">Decision Required</strong>
            </div>
            <h2 id="questionTitle">Question title</h2>
            <p id="questionText">Question text</p>
            <div class="choice-list" id="choiceList"></div>
          </section>

          <section class="log-panel" aria-label="Recent decisions">
            <h2>Recent Decisions</h2>
            <div id="eventLog" class="event-log"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
