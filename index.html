<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>City Hall Simulator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1>City Hall Simulator</h1>
        <div class="date-line">
          <span id="termLabel">Year 1</span>
          <span id="quarterLabel">Q1</span>
          <span id="approvalSummary">Approval 0%</span>
        </div>
      </header>

      <section class="layout">
        <aside class="sidebar" aria-label="City electorate">
          <h2 id="cityName">Fairview</h2>
          <div class="city-row">
            <span>Population</span>
            <strong id="populationMetric">0</strong>
          </div>
          <div class="city-row">
            <span>Annual Balance</span>
            <strong id="balanceMetric">$0M</strong>
          </div>

          <h3>Voter Groups</h3>
          <div id="groupList" class="group-list"></div>
        </aside>

        <section class="simulation" aria-label="City simulation">
          <section class="panel">
            <div class="panel-title">
              <h2>City Conditions</h2>
              <button id="advanceTurn" type="button">Advance Quarter</button>
            </div>
            <div id="metricsGrid" class="metrics-grid"></div>
          </section>

          <section class="panel">
            <div class="panel-title">
              <h2>Policy Effects</h2>
              <span id="policyCount">0 active</span>
            </div>
            <div id="effectsList" class="effects-list"></div>
          </section>

          <section class="panel">
            <div class="panel-title">
              <h2>News</h2>
              <span>local media</span>
            </div>
            <div id="newsLog" class="news-log"></div>
          </section>
        </section>

        <section class="policy-panel" aria-label="Policies">
          <nav id="tabs" class="tabs" aria-label="Policy departments"></nav>
          <div id="policyList" class="policy-list"></div>
        </section>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
